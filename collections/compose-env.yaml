---
services:
  springdb:
    image: postgres:${IMAGE_POSTGRES}
    restart: "no"
    hostname: springdb
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST_AUTH_METHOD=trust
      - TZ=${TZ}
    volumes:
      - ./postgresql/sql:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"  # serve database
    networks:
      - spring-lessons
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  jaeger:
    image: jaegertracing/jaeger:${IMAGE_JAEGER}
    restart: "no"
    hostname: jaeger
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
    ports:
      - "6831"   # accept jaeger.thrift over Thrift-compact protocol
      - "6832"   # accept jaeger.thrift over Thrift-binary protocol
      - "5778"   # serve configs (sampling, etc.) over HTTP
      - "5779"   # serve configs (sampling, etc.) over gRPC
      - "16686:16686"  # serve frontend
      - "4317"   # accept OpenTelemetry Protocol (OTLP) over gRPC
      - "4318"   # accept OpenTelemetry Protocol (OTLP) over HTTP
      - "9411"   # Zipkin compatible endpoint (optional)
    networks:
      - spring-lessons

  loki:
    image: grafana/loki:${IMAGE_LOKI}
    restart: "no"
    hostname: loki
    environment:
      - TZ=${TZ}
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100"  # serve http server
      - "9096"  # serve grpc server
    networks:
      - spring-lessons

  prometheus:
    image: prom/prometheus:${IMAGE_PROMETHEUS}
    restart: "no"
    hostname: prometheus
    environment:
      - TZ=${TZ}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus-config.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"  # serve frontend
    networks:
      - spring-lessons
    depends_on:
      otelcol:
        condition: service_started

  grafana:
    image: grafana/grafana-enterprise:${IMAGE_GRAFANA}
    restart: "no"
    hostname: grafana
    environment:
      - TZ=${TZ}
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    ports:
      - "3000:3000"  # serve frontend
    networks:
      - spring-lessons
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
      loki:
        condition: service_started
      springdb:
        condition: service_started

  otelcol:
    image: otel/opentelemetry-collector:${IMAGE_OTELCOL}
    restart: "no"
    hostname: otelcol
    environment:
      - TZ=${TZ}
    command:
      - --config=/etc/otelcol-config.yml
    volumes:
      - ./otel/otelcol-config.yml:/etc/otelcol-config.yml
    ports:
      - "8888"  # Prometheus metrics exposed by the Collector
      - "8889"  # Prometheus exporter metrics
      - "13133"  # health_check extension
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP http receiver
      - "55679"  # zpages extension
      - "1777"  # pprof extension
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - spring-lessons

  kafka:
    image: apache/kafka:${IMAGE_KAFKA}
    restart: "no"
    hostname: kafka
    environment:
      - TZ=${TZ}
      - KAFKA_NODE_ID=0
      - KAFKA_LISTENERS=PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=1
    ports:
      - "9092:9092"  # serve broker internally
      - "29092:29092"  # serve broker externally
    networks:
      - spring-lessons
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:${IMAGE_KEYCLOAK}
    restart: "no"
    hostname: keycloak
    environment:
      - TZ=${TZ}
      - JAVA_OPTS_KC_HEAP=-XX:MaxRAMPercentage=70 -XX:MinRAMPercentage=70 -XX:InitialRAMPercentage=50
    # start-dev: disables TLS, caching and persistent sessions — intentional for local development only.
    # For any other environment use `start` with proper hostname and TLS configuration.
    command:
      - start-dev
      - --import-realm
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/export:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    networks:
      - spring-lessons
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  wiremock:
    build:
      context: .
      dockerfile: wiremock/Containerfile
      args:
        IMAGE_WIREMOCK: ${IMAGE_WIREMOCK}
    image: custom-wiremock:latest
    restart: "no"
    hostname: wiremock
    environment:
      - TZ=${TZ}
    entrypoint:
      - "/docker-entrypoint.sh"
      - --global-response-templating
      - --verbose
      - "--extensions"
      - "org.wiremock.RandomExtension"
    volumes:
      - ./wiremock/__files:/home/wiremock/__files
      - ./wiremock/mappings:/home/wiremock/mappings
    ports:
      - "9998:8080"  # serve web server http
      - "9999:8443"  # serve web server https
    networks:
      - spring-lessons

  mailpit:
    image: axllent/mailpit:${IMAGE_MAILPIT}
    restart: "no"
    hostname: mailpit
    environment:
      - TZ=${TZ}
      - MP_MAX_MESSAGES=5000
      - MP_DATABASE=/data/mailpit.db
      - MP_SMTP_AUTH_ALLOW_INSECURE=false
      - MP_SMTP_AUTH_FILE=/config/auth_file
      - MP_SMTP_REQUIRE_STARTTLS=true
      - MP_SMTP_TLS_KEY=sans:localhost
      - MP_SMTP_TLS_CERT=sans:localhost
      - MP_POP3_AUTH_FILE=/config/auth_file
      - MP_ENABLE_PROMETHEUS=0.0.0.0:9091
    volumes:
      - ./mailpit/data:/data
      - ./mailpit/config:/config
    ports:
      - "8025:8025"  # serve web ui
      - "1025:1025"  # serve smtp server
      - "1026:1011"  # serve pop3 server
      - "9091:9091"  # server prometheus metrics
    networks:
      - spring-lessons

networks:
  spring-lessons:
    driver: bridge

volumes:
  keycloak-data:
