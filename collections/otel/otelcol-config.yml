---
receivers:
  otlp:
    protocols:
      http:
        endpoint: otelcol:4318
      grpc:
        endpoint: otelcol:4317
  jaeger:
    protocols:
      grpc:
        endpoint: otelcol:4317
      thrift_binary:
      thrift_compact:
      thrift_http:

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 64
    spike_limit_mib: 12
  batch:
    timeout: 1s
    send_batch_size: 8192
    send_batch_max_size: 0

exporters:
  debug:
    verbosity: detailed
  prometheus:
    endpoint: otelcol:8889
  otlp_grpc:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlp_http:
    endpoint: http://loki:3100/otlp
    compression: none
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: otelcol:13133
  pprof:
    endpoint: otelcol:1777
  zpages:
    endpoint: otelcol:55679

service:
  extensions:
  - health_check
  - pprof
  - zpages
  pipelines:
    traces:
      receivers:
      - otlp
      processors:
      - memory_limiter
      - batch
      exporters:
      - otlp_grpc
      - debug
    metrics:
      receivers:
      - otlp
      processors:
      - memory_limiter
      - batch
      exporters:
      - prometheus
      - debug
    logs:
      receivers:
      - otlp
      processors:
      - memory_limiter
      - batch
      exporters:
      - otlp_http
      - debug