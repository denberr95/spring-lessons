---
services:
  keycloak-export:
    image: quay.io/keycloak/keycloak:${IMAGE_KEYCLOAK}
    restart: "no"
    hostname: keycloak-export
    # In rootless podman container root maps to the host user that owns
    # ./keycloak/export, so the realm export can be written back to the repo.
    user: root
    environment:
      - TZ=${TZ}
    command:
      - export
      - --dir
      - /opt/keycloak/export
      - --realm
      - master
      - --users
      - same_file
      - --verbose
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/export:/opt/keycloak/export
    networks:
      - spring-lessons

networks:
  spring-lessons:
    driver: bridge

volumes:
  keycloak-data:
